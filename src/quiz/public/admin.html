<!DOCTYPE html>
<html lang="da" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Quiz Admin — Recently Played</title>
  <link rel="stylesheet" href="/quiz/static/admin.css">
</head>
<body>
  <div class="container">
    <!-- Audio Setup + Mini Player -->
    <div id="audio-setup" class="audio-setup">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="font-size:18px;font-weight:700">Audio Setup</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <span id="setup-provider-icon">🔇</span>
          <span id="setup-provider-label" style="color:var(--muted);font-size:13px">No music source</span>
          <button id="btn-setup-connect" onclick="setupConnectAppleMusic()" style="background:none;border:1px solid var(--red);color:var(--red);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer">Connect Apple Music</button>
          <button id="btn-setup-test" onclick="setupTestPlay()" style="display:none;background:none;border:1px solid var(--green);color:var(--green);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer">Test Play</button>
          <button id="btn-setup-stop" onclick="setupStop()" style="display:none;background:none;border:1px solid var(--muted);color:var(--muted);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer">Stop</button>
          <button id="btn-setup-airplay" onclick="setupAirPlay()" style="display:none;background:none;border:1px solid #5ac8fa;color:#5ac8fa;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer">AirPlay</button>
        </div>
      </div>
      <!-- Mini Now Playing bar -->
      <div id="mini-player" style="display:none">
        <div style="display:flex;align-items:center;gap:14px">
          <img id="mp-artwork" src="" style="width:56px;height:56px;border-radius:8px;object-fit:cover;cursor:pointer" onclick="toggleNowPlayingOverlay()">
          <div style="flex:1;min-width:0">
            <div id="mp-track" style="font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
            <div id="mp-artist" style="font-size:13px;color:var(--muted);margin-top:2px"></div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
              <span id="mp-time-pos" style="font-size:11px;color:var(--dimmer);min-width:30px">0:00</span>
              <div style="flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden">
                <div id="mp-progress" style="height:100%;background:var(--red);border-radius:2px;width:0%;transition:width 0.5s linear"></div>
              </div>
              <span id="mp-time-dur" style="font-size:11px;color:var(--dimmer);min-width:30px;text-align:right">0:00</span>
            </div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <button onclick="setupPlayPause()" id="mp-play-btn" style="background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px 8px">⏸</button>
            <button onclick="setupStop()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px">⏹</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Now Playing Overlay (loads the real Now Playing page in an iframe) -->
    <div id="np-overlay" style="display:none;position:fixed;inset:0;z-index:90">
      <iframe id="np-iframe" style="width:100%;height:100%;border:none" src=""></iframe>
      <button onclick="toggleNowPlayingOverlay()" style="position:fixed;top:20px;right:20px;z-index:91;background:rgba(255,255,255,0.1);border:none;color:#888;font-size:28px;width:44px;height:44px;border-radius:50%;cursor:pointer;backdrop-filter:blur(8px)">✕</button>
    </div>

    <header>
      <div>
        <h1>Recently Played</h1>
        <p class="subtitle"><span id="track-count">0</span> tracks</p>
      </div>
      <div class="header-actions">
        <div class="view-toggle">
          <button class="toggle-btn active" id="btn-grid" onclick="setView('grid')">Grid</button>
          <button class="toggle-btn" id="btn-list" onclick="setView('list')">List</button>
        </div>
        <button class="clear-btn" onclick="clearUsedSongs()">Clear Used Songs</button>
        <a href="/quiz/builder" class="back-link">Quiz Builder</a>
        <a href="/quiz/host" class="back-link">DJ Mode</a>
        <a href="javascript:void(0)" onclick="toggleNowPlayingOverlay()" class="back-link">Now Playing</a>
        <a href="/quiz/host" class="back-link">Host</a>
      </div>
    </header>

    <div id="tracks-container" class="tracks-grid"></div>
    <div id="loading" class="loading">Loading tracks...</div>
    <div id="empty" class="empty" style="display:none">No recently played tracks found.</div>
  </div>

  <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js" async></script>
  <script src="/quiz/static/admin.js"></script>
  <script>
    // ─── Audio Setup (MusicKit JS) ─────────────────────────
    let setupMK = null;
    let setupAuthorized = false;

    async function setupInitMusicKit() {
      if (typeof MusicKit === 'undefined') return;
      try {
        const res = await fetch('/quiz/api/musickit-token');
        const { token } = await res.json();
        await MusicKit.configure({
          developerToken: token,
          app: { name: 'Music Quiz', build: '3.0.0' },
        });
        setupMK = MusicKit.getInstance();
        if (setupMK.isAuthorized) setupOnAuthorized();
        updateSetupUI();
      } catch (err) {
        console.error('MusicKit init failed:', err);
      }
    }

    async function setupConnectAppleMusic() {
      if (!setupMK) {
        await setupInitMusicKit();
        if (!setupMK) return;
      }
      try {
        document.getElementById('btn-setup-connect').textContent = 'Connecting...';
        await setupMK.authorize();
        setupOnAuthorized();
      } catch {
        document.getElementById('btn-setup-connect').textContent = 'Connect Apple Music';
      }
    }

    function setupOnAuthorized() {
      setupAuthorized = true;
      updateSetupUI();
      startNowPlayingPush();
      startMiniPlayerUpdates();
      // Tell server to switch provider (so polling stops and push takes over)
      fetch('/quiz/api/set-provider', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider: 'musickit-web' }),
      }).catch(() => {});
    }

    // Push now-playing on track/state change + periodic sync
    let npPushInterval = null;
    let npLastTrack = '';
    let npLastState = '';

    function pushNowPlaying() {
      if (!setupMK || !setupAuthorized) return;
      try {
        const np = setupMK.nowPlayingItem;
        const pos = setupMK.currentPlaybackTime || 0;
        const dur = setupMK.currentPlaybackDuration || 0;
        const pbState = setupMK.playbackState;
        // MusicKit v3: 0=none, 1=loading, 2=playing, 3=paused, 4=stopped, 5=ended
        const state = pbState === 2 ? 'playing' : pbState === 3 ? 'paused' : 'stopped';

        const data = {
          state,
          track: np?.title || np?.name || undefined,
          artist: np?.artistName || undefined,
          album: np?.albumName || undefined,
          artworkUrl: np?.artwork?.url?.replace('{w}', '600')?.replace('{h}', '600') || undefined,
          duration: dur,
          position: pos,
        };

        // Always push — even "stopped" so Now Playing shows correct state
        fetch('/quiz/api/now-playing', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        }).catch(() => {});
      } catch (e) { console.error('Push error:', e); }
    }

    function startNowPlayingPush() {
      if (npPushInterval) return;
      // Try event-driven push (MusicKit JS v3 events)
      try {
        setupMK.addEventListener('playbackStateDidChange', () => pushNowPlaying());
        setupMK.addEventListener('nowPlayingItemDidChange', () => pushNowPlaying());
      } catch (e) { console.log('MusicKit events not available, using interval only'); }
      // Reliable interval — push every 1s for smooth progress on Now Playing
      npPushInterval = setInterval(pushNowPlaying, 1000);
      pushNowPlaying();
    }

    function updateSetupUI() {
      const icon = document.getElementById('setup-provider-icon');
      const label = document.getElementById('setup-provider-label');
      const connectBtn = document.getElementById('btn-setup-connect');
      const testBtn = document.getElementById('btn-setup-test');
      const stopBtn = document.getElementById('btn-setup-stop');
      const airplayBtn = document.getElementById('btn-setup-airplay');

      if (setupAuthorized) {
        icon.textContent = '🎵';
        label.textContent = 'Apple Music connected';
        label.style.color = '#34c759';
        connectBtn.style.display = 'none';
        testBtn.style.display = '';
        stopBtn.style.display = '';
        airplayBtn.style.display = '';
      } else if (setupMK) {
        icon.textContent = '🔑';
        label.textContent = 'Ready to connect';
        label.style.color = '#ffd60a';
      }
    }

    async function setupTestPlay() {
      if (!setupMK || !setupAuthorized) return;
      const np = document.getElementById('setup-now-playing');
      np.style.display = '';
      np.textContent = 'Searching...';
      try {
        const results = await setupMK.api.music(`/v1/catalog/${setupMK.storefrontId || 'dk'}/search`, {
          term: 'Theme from New York New York Frank Sinatra', types: 'songs', limit: 1,
        });
        const song = results?.data?.results?.songs?.data?.[0];
        if (!song) { np.textContent = 'No results'; return; }
        await setupMK.setQueue({ song: song.id });
        await setupMK.play();
        np.innerHTML = `<span style="color:var(--green)">▶</span> ${song.attributes.name} — ${song.attributes.artistName}`;
      } catch (err) {
        np.textContent = 'Playback failed: ' + err.message;
      }
    }

    async function setupStop() {
      if (setupMK) {
        setupMK.pause();
        document.getElementById('setup-now-playing').style.display = 'none';
      }
    }

    function findMusicKitAudioElement() {
      // MusicKit JS creates audio/video elements internally — find the active one
      const mediaEls = [...document.querySelectorAll('audio, video')];
      // Prefer the one that has a src and is not our dummy
      for (const el of mediaEls) {
        if (el.src && !el.src.startsWith('data:') && el.webkitShowPlaybackTargetPicker) {
          return el;
        }
      }
      // Fallback: any element with the picker
      for (const el of mediaEls) {
        if (el.webkitShowPlaybackTargetPicker) return el;
      }
      return null;
    }

    function setupAirPlay() {
      const el = findMusicKitAudioElement();
      if (el) {
        el.webkitShowPlaybackTargetPicker();
      } else {
        const toast = document.getElementById('setup-now-playing');
        toast.style.display = '';
        toast.textContent = 'Play a song first, then click AirPlay to select speakers';
      }
    }

    // ─── Mini Player + Overlay Updates ─────────────────────
    let miniPlayerInterval = null;

    function startMiniPlayerUpdates() {
      if (miniPlayerInterval) return;
      miniPlayerInterval = setInterval(updateMiniPlayer, 500);
    }

    function updateMiniPlayer() {
      if (!setupMK || !setupAuthorized) return;
      const np = setupMK.nowPlayingItem;
      const miniEl = document.getElementById('mini-player');
      const pbState = setupMK.playbackState;
      // MusicKit v3 states: 0=none, 1=loading, 2=playing, 3=paused, 4=stopped, 5=ended
      const isPlaying = pbState === 2;
      const isPaused = pbState === 3;
      const hasTrack = np && (isPlaying || isPaused || pbState === 1);

      if (!hasTrack) {
        miniEl.style.display = 'none';
        return;
      }
      miniEl.style.display = '';

      const artUrl = np.artwork?.url?.replace('{w}', '200')?.replace('{h}', '200') || '';
      const artUrlLarge = np.artwork?.url?.replace('{w}', '600')?.replace('{h}', '600') || '';
      const pos = setupMK.currentPlaybackTime || 0;
      const dur = setupMK.currentPlaybackDuration || 0;
      const fmt = s => Math.floor(s / 60) + ':' + String(Math.floor(s) % 60).padStart(2, '0');

      // Mini player
      const artEl = document.getElementById('mp-artwork');
      if (artEl.src !== artUrl && artUrl) artEl.src = artUrl;
      document.getElementById('mp-track').textContent = np.title || '';
      document.getElementById('mp-artist').textContent = np.artistName || '';
      document.getElementById('mp-time-pos').textContent = fmt(pos);
      document.getElementById('mp-time-dur').textContent = fmt(dur);
      if (dur > 0) document.getElementById('mp-progress').style.width = (pos / dur * 100) + '%';
      document.getElementById('mp-play-btn').textContent = isPlaying ? '⏸' : '▶';

    }


    function toggleNowPlayingOverlay() {
      const overlay = document.getElementById('np-overlay');
      const iframe = document.getElementById('np-iframe');
      if (overlay.style.display === 'block') {
        overlay.style.display = 'none';
        iframe.src = '';
      } else {
        overlay.style.display = 'block';
        iframe.src = '/quiz/now-playing';
      }
    }

    function setupPlayPause() {
      if (!setupMK) return;
      if (setupMK.playbackState === 2) {
        setupMK.pause();
      } else {
        setupMK.play().catch(() => {});
      }
    }

    // ─── Init ────────────────────────────────────────────────

    document.addEventListener('musickitloaded', () => setupInitMusicKit());
    setTimeout(() => { if (!setupMK && typeof MusicKit !== 'undefined') setupInitMusicKit(); }, 3000);
  </script>
</body>
</html>
