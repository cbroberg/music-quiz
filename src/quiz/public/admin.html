<!DOCTYPE html>
<html lang="da" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Quiz Admin — Recently Played</title>
  <link rel="stylesheet" href="/quiz/static/admin.css">
</head>
<body>
  <div class="container">
    <!-- Audio Setup + Mini Player -->
    <div id="audio-setup" class="audio-setup">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="font-size:18px;font-weight:700">Audio Setup</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <span id="setup-provider-icon">🔇</span>
          <span id="setup-provider-label" style="color:var(--muted);font-size:13px">No music source</span>
        </div>
      </div>
      <!-- Provider Toggle + Actions -->
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="provider-toggle" id="provider-toggle">
          <button id="btn-prov-mk" onclick="switchProvider('musickit-web')" class="prov-btn">MusicKit JS</button>
          <button id="btn-prov-hc" onclick="switchProvider('home-controller')" class="prov-btn">Home Controller</button>
        </div>
        <button id="btn-setup-connect" onclick="setupConnectAppleMusic()" style="display:none;background:none;border:1px solid var(--red);color:var(--red);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer">Connect Apple Music</button>
        <button id="btn-setup-test" onclick="setupTestPlay()" style="display:none;background:none;border:1px solid var(--green);color:var(--green);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer">Test Play</button>
        <button id="btn-setup-stop" onclick="setupStop()" style="display:none;background:none;border:1px solid var(--muted);color:var(--muted);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer">Stop</button>
        <button id="btn-setup-airplay" onclick="setupAirPlay()" style="display:none;background:none;border:1px solid #5ac8fa;color:#5ac8fa;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer">AirPlay</button>
      </div>
      <!-- Mini Now Playing bar -->
      <div id="mini-player" style="display:none">
        <div style="display:flex;align-items:center;gap:14px">
          <img id="mp-artwork" src="" style="width:56px;height:56px;border-radius:8px;object-fit:cover;cursor:pointer" onclick="toggleNowPlayingOverlay()">
          <div style="flex:1;min-width:0">
            <div id="mp-track" style="font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
            <div id="mp-artist" style="font-size:13px;color:var(--muted);margin-top:2px"></div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
              <span id="mp-time-pos" style="font-size:11px;color:var(--dimmer);min-width:30px">0:00</span>
              <div style="flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden">
                <div id="mp-progress" style="height:100%;background:var(--red);border-radius:2px;width:0%;transition:width 0.5s linear"></div>
              </div>
              <span id="mp-time-dur" style="font-size:11px;color:var(--dimmer);min-width:30px;text-align:right">0:00</span>
            </div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <button onclick="setupPlayPause()" id="mp-play-btn" style="background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px 8px">⏸</button>
            <button onclick="setupStop()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px">⏹</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Now Playing Overlay (embedded vinyl sphere — no iframe) -->
    <div id="np-overlay" class="np-overlay" style="display:none">
      <button onclick="toggleNowPlayingOverlay()" class="np-close">✕</button>
      <div class="np-sphere-container">
        <div class="np-glow-outer"></div>
        <div class="np-glow-core" id="npo-glow"></div>
        <div class="np-vinyl" id="npo-vinyl">
          <img id="npo-artwork" src="" alt="">
          <div class="np-vinyl-grooves"></div>
          <div class="np-vinyl-center"></div>
          <div class="np-vinyl-edge"></div>
        </div>
        <div class="np-highlight"></div>
      </div>
      <div class="np-info">
        <div class="np-track" id="npo-track"></div>
        <div class="np-artist" id="npo-artist"></div>
        <div class="np-album" id="npo-album"></div>
        <div class="np-progress-row">
          <span id="npo-pos">0:00</span>
          <div class="np-progress-bar"><div class="np-progress-fill" id="npo-progress"></div></div>
          <span id="npo-dur">0:00</span>
        </div>
      </div>
    </div>

    <header>
      <div>
        <h1>Recently Played</h1>
        <p class="subtitle"><span id="track-count">0</span> tracks</p>
      </div>
      <div class="header-actions">
        <div class="view-toggle">
          <button class="toggle-btn active" id="btn-grid" onclick="setView('grid')">Grid</button>
          <button class="toggle-btn" id="btn-list" onclick="setView('list')">List</button>
        </div>
        <button class="clear-btn" onclick="clearUsedSongs()">Clear Used Songs</button>
        <a href="/quiz/builder" class="back-link">Quiz Builder</a>
        <a href="/quiz/host" class="back-link">DJ Mode</a>
        <a href="javascript:void(0)" onclick="toggleNowPlayingOverlay()" class="back-link">Now Playing</a>
        <a href="/quiz/host" class="back-link">Host</a>
      </div>
    </header>

    <div id="tracks-container" class="tracks-grid"></div>
    <div id="loading" class="loading">Loading tracks...</div>
    <div id="empty" class="empty" style="display:none">No recently played tracks found.</div>
  </div>

  <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js" defer></script>
  <script src="/quiz/static/player.js" defer></script>
  <script src="/quiz/static/admin.js" defer></script>
  <script>
    // Wait for deferred scripts (player.js) to load
    document.addEventListener('DOMContentLoaded', () => {

    // ─── Admin uses universal Player for everything ──────────

    function switchProvider(provider) {
      Player.setPreferredProvider(provider);
      updateSetupUI();
    }

    async function setupConnectAppleMusic() {
      document.getElementById('btn-setup-connect').textContent = 'Connecting...';
      const ok = await Player.authorize();
      if (ok) updateSetupUI();
      else document.getElementById('btn-setup-connect').textContent = 'Connect Apple Music';
    }

    function updateSetupUI() {
      const icon = document.getElementById('setup-provider-icon');
      const label = document.getElementById('setup-provider-label');
      const connectBtn = document.getElementById('btn-setup-connect');
      const testBtn = document.getElementById('btn-setup-test');
      const stopBtn = document.getElementById('btn-setup-stop');
      const airplayBtn = document.getElementById('btn-setup-airplay');
      const mkBtn = document.getElementById('btn-prov-mk');
      const hcBtn = document.getElementById('btn-prov-hc');
      const prov = Player.getPreferredProvider();

      mkBtn.classList.toggle('active', prov === 'musickit-web');
      hcBtn.classList.toggle('active', prov === 'home-controller');

      if (prov === 'home-controller') {
        icon.textContent = '🏠'; label.textContent = 'Home Controller (Mac)'; label.style.color = '#5ac8fa';
        connectBtn.style.display = 'none'; testBtn.style.display = ''; stopBtn.style.display = '';
        airplayBtn.style.display = 'none';
      } else if (Player.isMusicKitAuthorized()) {
        icon.textContent = '🎵'; label.textContent = 'Apple Music (browser)'; label.style.color = '#34c759';
        connectBtn.style.display = 'none'; testBtn.style.display = ''; stopBtn.style.display = '';
        airplayBtn.style.display = '';
      } else {
        icon.textContent = '🔇'; label.textContent = 'No music source'; label.style.color = 'var(--muted)';
        connectBtn.style.display = ''; testBtn.style.display = 'none'; stopBtn.style.display = 'none';
        airplayBtn.style.display = 'none';
      }
    }

    async function setupTestPlay() {
      const btn = document.getElementById('btn-setup-test');
      btn.textContent = 'Playing...'; btn.style.color = '#ffd60a'; btn.style.borderColor = '#ffd60a';
      const ok = await Player.play(null, 'Theme from New York, New York', 'Frank Sinatra');
      btn.textContent = ok ? '▶ Playing' : 'Failed';
      btn.style.color = ok ? '#34c759' : '#fc3c44';
      btn.style.borderColor = btn.style.color;
      setTimeout(() => { btn.textContent = 'Test Play'; btn.style.color = '#34c759'; btn.style.borderColor = '#34c759'; }, 3000);
    }

    function setupStop() {
      Player.stop();
      const btn = document.getElementById('btn-setup-stop');
      btn.textContent = '⏹ Stopped';
      setTimeout(() => { btn.textContent = 'Stop'; }, 1500);
    }

    function setupPlayPause() { Player.togglePlayPause(); }
    function setupAirPlay() { Player.showAirPlayPicker(); }
    function toggleNowPlayingOverlay() {
      const o = document.getElementById('np-overlay');
      o.style.display = o.style.display === 'flex' ? 'none' : 'flex';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const o = document.getElementById('np-overlay');
        if (o.style.display === 'flex') toggleNowPlayingOverlay();
      }
    });

    // ─── Mini Player + Overlay — driven by Player.onUpdate ───

    Player.onUpdate((s) => {
      // Mini player
      const miniEl = document.getElementById('mini-player');
      const fmt = sec => Math.floor(sec / 60) + ':' + String(Math.floor(sec) % 60).padStart(2, '0');

      if (s.state === 'stopped' || !s.track) { miniEl.style.display = 'none'; }
      else {
        miniEl.style.display = '';
        const artEl = document.getElementById('mp-artwork');
        const artUrl = s.artworkSmall || s.artworkUrl;
        if (artUrl && artEl.src !== artUrl) artEl.src = artUrl;
        document.getElementById('mp-track').textContent = s.track || '';
        document.getElementById('mp-artist').textContent = s.artist || '';
        document.getElementById('mp-time-pos').textContent = fmt(s.position || 0);
        document.getElementById('mp-time-dur').textContent = fmt(s.duration || 0);
        if (s.duration > 0) document.getElementById('mp-progress').style.width = ((s.position || 0) / s.duration * 100) + '%';
        document.getElementById('mp-play-btn').textContent = s.state === 'playing' ? '⏸' : '▶';
      }

      // Now Playing overlay
      const overlay = document.getElementById('np-overlay');
      if (overlay.style.display === 'flex' && s.track) {
        const isPlaying = s.state === 'playing';
        document.getElementById('npo-glow').classList.toggle('np-playing', isPlaying);
        document.getElementById('npo-vinyl').classList.toggle('np-spinning', isPlaying);
        const oArt = document.getElementById('npo-artwork');
        if (s.artworkUrl && oArt.src !== s.artworkUrl) oArt.src = s.artworkUrl;
        document.getElementById('npo-track').textContent = s.track;
        document.getElementById('npo-artist').textContent = s.artist || '';
        document.getElementById('npo-album').textContent = s.album || '';
        document.getElementById('npo-pos').textContent = fmt(s.position || 0);
        document.getElementById('npo-dur').textContent = fmt(s.duration || 0);
        if (s.duration > 0) document.getElementById('npo-progress').style.width = ((s.position || 0) / s.duration * 100) + '%';
      }
    });

    // Init UI
    setTimeout(updateSetupUI, 500);
    setTimeout(updateSetupUI, 3000);

    }); // end DOMContentLoaded
  </script>
</body>
</html>
